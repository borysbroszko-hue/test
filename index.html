<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiquidCloud Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="starfield-canvas"></canvas>
    <div id="overlay" class="overlay"></div>

    <div class="app-wrapper">
        <header class="header">
            <div class="header-container">
                <img src="assets/logo.png" id="brand-logo" class="brand-logo" alt="Logo">
                
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Szukaj smaku...">
                </div>

                <button id="menu-toggle" class="menu-btn">
                    <div class="bar"></div>
                    <div class="bar"></div>
                </button>
            </div>

            <div class="categories-drawer" id="categories-panel">
                <div class="drawer-header">
                    <span>Menu Kategorii</span>
                    <button id="menu-close"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="categories-list" id="categories-list"></div>
            </div>
        </header>

        <main class="products-grid" id="products-grid"></main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
